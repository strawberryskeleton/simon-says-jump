<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Jump!</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./main.js" defer></script>
</head>
<body>
    <!-- NAVBAR -->
    <header>
        <div class="logo">Simon Says, "Jump!"</div>
        <div class="stats">
            <div class="highscore-div">High Score: <span id="highscore">00</span></div>
            <div class="score-div">Score: <span id="score">00</span></div>
        </div>
    </header>

    <!-- MAIN -->
    <main>
        <div class="simon">

            <div class="stickman">
                <div class="figure-img">
                    <img src="./assets/stickman.png" alt="stickman">
                </div>
                <div class="name-tag">SIMON</div>
            </div>

            <div class="speech-bubble">
                <!-- <div class="intro-text">Simon Says</div> -->
                <div class="cmd-box" id="cmd-box">...</div>
            </div>

        </div>

        <div class="you">

            <div class="stickman">
                <div class="figure-img" id="you">
                    <img src="./assets/stickman.png" alt="stickman">
                </div>
                <div class="name-tag">YOU</div>
            </div>

        </div>
    </main>

    <!-- FOTTER -->
    <footer></footer>

    <!-- START / END SCREEN -->
    <div id="start-screen" class="">
        <h1>Simon Says, "Jump!"</h1>
        <p>press spacebar to jump when simon says jump</p>

        <button class="start-game-btn">Start Game</button>
    </div>

    <div id="end-screen" class="hidden">
        <h1>Game Over</h1>
        <p>Your Score is <span id="end-score">00</span></p>
        <!-- <p>press spacebar to restart the game</p> -->

        <button class="start-game-btn">Restart Game</button>
    </div>
</body>
</html>
