<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Jump!</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./main.js" defer></script>
</head>
<body>
    <!-- NAVBAR -->
    <header></header>

    <!-- MAIN -->
    <main>
        <div class="simon">

            <div class="stickman">
                <div class="figure-img">
                    <img src="./assets/stickman.png" alt="stickman">
                </div>
                <div class="name-tag">SIMON</div>
            </div>

            <div class="speech-bubble">
                <!-- <div class="intro-text">Simon Says</div> -->
                <div class="cmd-box" id="cmd-box">...</div>
            </div>

        </div>

        <div class="you">

            <div class="stickman">
                <div class="figure-img" id="you">
                    <img src="./assets/stickman.png" alt="stickman">
                </div>
                <div class="name-tag">YOU</div>
            </div>

        </div>
    </main>

    <!-- FOTTER -->
    <footer></footer>
</body>
</html>
